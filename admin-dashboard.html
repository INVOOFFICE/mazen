<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin — Mazen Chef</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
  <div class="dashboard" id="app">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar">
      <a href="index.html" class="logo">Mazen Chef<span>Administration</span></a>
      <nav class="dashboard-nav">
        <a href="#" class="active" data-tab="menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/><rect x="2" y="3" width="20" height="18" rx="2"/></svg>
          Menu
        </a>
        <a href="#" data-tab="reservations">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Réservations
        </a>
      </nav>
      <button class="dashboard-logout" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Déconnexion
      </button>
    </aside>

    <!-- Main -->
    <main class="dashboard-main">
      <div class="dashboard-header">
        <div>
          <h2 id="pageTitle">Gestion du Menu</h2>
          <p class="subtitle" id="pageSubtitle">Gère les plats affichés sur le site</p>
        </div>
        <div>
          <a href="index.html" class="btn-admin-secondary">&larr; Voir le site</a>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="statsGrid"></div>

      <!-- Tab: Menu -->
      <div class="tab-content active" id="tab-menu">
        <!-- Add / Edit Form -->
        <div class="add-form" id="menuForm">
          <h3 id="menuFormTitle">Ajouter un plat</h3>
          <input type="hidden" id="editId" value="">
          <div class="form-row">
            <div class="form-group">
              <label for="itemName">Nom du plat</label>
              <input type="text" id="itemName" placeholder="Ex: Chicken Skewers Dish" required>
            </div>
            <div class="form-group">
              <label for="itemCategory">Catégorie</label>
              <input type="text" id="itemCategory" placeholder="Ex: Grills" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="itemPrice">Prix</label>
              <input type="text" id="itemPrice" placeholder="Ex: 110 MAD" required>
            </div>
            <div class="form-group">
              <label for="itemTag">Tag (optionnel)</label>
              <input type="text" id="itemTag" placeholder="Ex: Signature, Popular">
            </div>
          </div>
          <div class="form-group">
            <label for="itemDesc">Description</label>
            <textarea id="itemDesc" placeholder="Description du plat..." required></textarea>
          </div>
          <div class="form-group">
            <label>Photo du plat</label>
            <div class="file-upload-wrap">
              <input type="file" id="itemImage" accept="image/*">
              <label for="itemImage" class="file-upload-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <span id="fileUploadLabel">Choisir un fichier</span>
              </label>
              <img id="imagePreview" class="image-preview is-hidden">
              <input type="hidden" id="itemImageUrl" value="">
            </div>
          </div>
          <div class="form-actions">
            <button class="btn-admin" id="saveItemBtn">Ajouter</button>
            <button class="btn-admin-secondary is-hidden" id="cancelEditBtn">Annuler</button>
          </div>
        </div>

        <!-- Menu Table -->
        <div class="table-container">
          <div class="table-header">
            <h3>Plats du menu</h3>
            <select id="sectionFilter" class="section-filter">
              <option value="home">Page d'accueil</option>
              <option value="all">Toutes les sections</option>
            </select>
          </div>
          <div id="menuTableBody">
            <div class="loading-state">
              <div class="spinner"></div>
              <p>Chargement du menu...</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Tab: Reservations -->
      <div class="tab-content" id="tab-reservations">
        <div class="table-container">
          <div class="table-header">
            <h3>Toutes les réservations</h3>
          </div>
          <div id="reservationsTableBody">
            <div class="loading-state">
              <div class="spinner"></div>
              <p>Chargement des réservations...</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- Confirm Modal -->
  <div class="confirm-modal" id="confirmModal">
    <div class="confirm-backdrop" id="confirmBackdrop"></div>
    <div class="confirm-card">
      <div class="confirm-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <p class="confirm-message" id="confirmMessage">Supprimer ce plat ? Cette action est irréversible.</p>
      <div class="confirm-actions">
        <button class="btn-admin-secondary" id="confirmCancel">Annuler</button>
        <button class="btn-admin-danger" id="confirmOk">Supprimer</button>
      </div>
    </div>
  </div>

  <script type="module" src="assets/js/components/admin-dashboard.js"></script>
</body>
</html>
