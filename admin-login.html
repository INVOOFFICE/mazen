<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin — Mazen Chef</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body class="admin-login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>Mazen Chef</h1>
      <p>Administration</p>
    </div>

    <div class="login-error" id="loginError"></div>

    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="admin@mazenchef.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Se connecter</button>
    </form>

    <div class="login-footer">
      <a href="index.html">&larr; Retour au site</a>
    </div>
  </div>

  <script type="module" src="assets/js/components/admin-login.js"></script>
</body>
</html>
